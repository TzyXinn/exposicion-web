<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title> Presentación | SENATI</title>
    <style>
        body { 
            background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0;
        }
        .card {
            background: #1e293b; padding: 40px; border-radius: 20px;
            text-align: center; border: 2px solid #3b82f6;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 350px;
        }
        .icon { font-size: 60px; margin-bottom: 20px; color: #ff5722; }
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        p { color: #94a3b8; margin-bottom: 30px; font-size: 0.9rem; }
        
        .btn-launch {
            background: #3b82f6; color: white; text-decoration: none;
            padding: 15px 30px; border-radius: 10px; font-weight: bold;
            display: block; transition: 0.3s;
        }
        .btn-launch:hover { background: #2563eb; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">📊</div>
        <h1>Presentación Ofimatica</h1>
        <p>LibreOffice - SENATI</p>
        
        <a href="https://github.com/TzyXinn/exposicion-web/blob/main/OpenSource.pptx" download class="btn-launch">
            ABRIR EN POWERPOINT
        </a>
    </div>

</body>
</html>
